<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Farm Monitor — Strategy Comparison</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e0;
            --muted: #888;
            --green: #00d68f;
            --red: #ff4d6a;
            --blue: #4da6ff;
            --purple: #a855f7;
            --yellow: #fbbf24;
            --orange: #f97316;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 1.4rem; font-weight: 600; }
        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            font-size: 0.9rem;
            color: var(--muted);
            background: transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); background: var(--card); }
        .tab.active {
            color: var(--text);
            background: var(--card);
            border-color: var(--border);
            font-weight: 600;
        }
        .tab .tab-pnl {
            font-size: 0.75rem;
            margin-left: 8px;
        }
        .tab .tab-pnl.green { color: var(--green); }
        .tab .tab-pnl.red { color: var(--red); }

        /* Comparison bar */
        .compare-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .compare-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            position: relative;
        }
        .compare-card.winner { border-color: var(--green); }
        .compare-card .label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .compare-card .value { font-size: 1.3rem; font-weight: 700; }
        .compare-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .crown { position: absolute; top: 8px; right: 10px; font-size: 0.7rem; color: var(--green); }

        /* Strategy panel */
        .strategy-panel { display: none; }
        .strategy-panel.active { display: block; }

        /* Stats grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }
        .stat-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
        .stat-value { font-size: 1.05rem; font-weight: 600; }

        /* Positions */
        .positions { display: flex; flex-direction: column; gap: 10px; }
        .position-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }
        .position-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .pool-name { font-size: 1rem; font-weight: 600; }
        .badge {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 4px;
            background: var(--border);
            color: var(--muted);
        }
        .badge-meridian { background: #1a1a2e; color: var(--blue); }
        .badge-custom { background: #1a2e1a; color: var(--green); }
        .badge-open { background: #1a2e1a; color: var(--green); }
        .badge-closed { background: #2e1a1a; color: var(--red); }
        .position-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .metric-label { font-size: 0.65rem; color: var(--muted); display: block; }
        .metric-value { font-size: 0.85rem; font-weight: 500; }

        /* Closed positions */
        .closed-section { margin-top: 20px; }
        .closed-section h3 {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .green { color: var(--green); }
        .red { color: var(--red); }
        .yellow { color: var(--yellow); }
        .blue { color: var(--blue); }

        #footer {
            margin-top: 24px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .compare-bar { grid-template-columns: 1fr; }
            .tabs { overflow-x: auto; }
            .tab { padding: 8px 14px; font-size: 0.8rem; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>LP Farm Monitor</h1>
        <div class="status">
            <div class="dot"></div>
            <span class="status-label">Connecting...</span>
        </div>
    </div>

    <div class="compare-bar" id="compare-bar"></div>

    <div class="tabs" id="tabs"></div>

    <div id="panels"></div>

    <div id="footer"></div>

    <script src="app.js"></script>
</body>
</html>
